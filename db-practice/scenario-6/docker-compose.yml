services:
  postgres:
    image: postgres:16
    container_name: pg-s6
    environment:
      POSTGRES_USER: restore_admin
      POSTGRES_PASSWORD: restore_admin_pass
      POSTGRES_DB: restoredb
    ports:
      - "5433:5432"
    volumes:
      - postgres_restore_data:/var/lib/postgresql/data
      - ../scenario-1/backups:/backups
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U restore_admin -d restoredb"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  postgres_restore_data:
